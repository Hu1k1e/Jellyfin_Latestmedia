name: Build & Release Plugin

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # needed for creating GitHub releases

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Restore NuGet packages
        run: dotnet restore ./Jellyfin_Latestmedia.csproj

      - name: Build plugin (Release)
        run: |
          dotnet build ./Jellyfin_Latestmedia.csproj \
            --configuration Release \
            --no-restore \
            -o ./publish

      - name: Get version from tag
        id: version
        # Strip the 'v' prefix if triggered by tag. If manually dispatched without tag, use 1.0.0 defaults.
        run: |
          if [[ "${GITHUB_REF_NAME}" == v* ]]; then
            echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT
          else
            CSPROJ_VERSION=$(grep -oPm1 '(?<=<Version>)[^<]+' ./Jellyfin_Latestmedia.csproj)
            echo "VERSION=${CSPROJ_VERSION:-1.0.1}" >> $GITHUB_OUTPUT
          fi

      - name: Create plugin ZIP
        run: |
          cd publish
          zip -j ../jellyfin_latestmedia_v${{ steps.version.outputs.VERSION }}.zip Jellyfin_Latestmedia.dll

      - name: Compute MD5 checksum
        id: checksum
        run: |
          CHECKSUM=$(md5sum jellyfin_latestmedia_v${{ steps.version.outputs.VERSION }}.zip | awk '{print $1}')
          echo "CHECKSUM=${CHECKSUM}" >> $GITHUB_OUTPUT
          echo "Plugin ZIP MD5: ${CHECKSUM}"

      - name: Update manifest.json with new version data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git checkout main
          git reset --hard origin/main
          
          VERSION=${{ steps.version.outputs.VERSION }}
          CHECKSUM=${{ steps.checksum.outputs.CHECKSUM }}
          TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          REPO="${{ github.repository }}"

          if [[ "$VERSION" == *.*.*.* ]]; then
            VER_ARG="$VERSION"
          else
            VER_ARG="${VERSION}.0"
          fi

          jq --arg ver "$VER_ARG" \
             --arg dl "https://github.com/${REPO}/releases/download/v${VERSION}/jellyfin_latestmedia_v${VERSION}.zip" \
             --arg cs "$CHECKSUM" \
             --arg ts "$TIMESTAMP" \
             '.[0].versions = [{
                "version": $ver,
                "changelog": ("Release " + $ver + ". See GitHub for details."),
                "targetAbi": "10.11.0.0",
                "sourceUrl": $dl,
                "checksum": $cs,
                "timestamp": $ts
             }] + .[0].versions' \
             manifest.json > manifest_updated.json && \
          mv manifest_updated.json manifest.json

      - name: Commit updated manifest
        run: |
          git add manifest.json
          git diff --staged --quiet && echo "No changes to commit" && exit 0
          git commit -m "chore: update manifest for v${{ steps.version.outputs.VERSION }} [skip ci]"
          git push origin main

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: v${{ steps.version.outputs.VERSION }}
          body: |
            ## Jellyfin_Latestmedia v${{ steps.version.outputs.VERSION }}

            ### Installation via Plugin Repository URL
            1. In Jellyfin, go to **Dashboard → Plugins → Repositories**.
            2. Add repository URL:
               ```
               https://raw.githubusercontent.com/${{ github.repository }}/main/manifest.json
               ```
            3. Go to **Catalog**, find **Latest Media & Management**, and install.
            4. Restart Jellyfin.

            ### Manual Installation
            Download the ZIP below, extract the `.dll` into your Jellyfin plugins directory, and restart.

            **ZIP MD5:** `${{ steps.checksum.outputs.CHECKSUM }}`
          files: |
            jellyfin_latestmedia_v${{ steps.version.outputs.VERSION }}.zip
          draft: false
          prerelease: false
